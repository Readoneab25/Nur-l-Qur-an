function renderNames(list) {
  const container = document.getElementById('names-grid');
  container.innerHTML = '';
  list.forEach(n => {
    const card = document.createElement('div');
    card.className = "card bg-zinc-800/70 border border-emerald-800/50 hover:border-amber-400/50 rounded-2xl p-5 sm:p-6 transition-all backdrop-blur-sm";
    card.innerHTML = `
      <div class="text-center mb-4">
        <div class="arabic-name text-4xl sm:text-5xl text-amber-400 mb-2">${n.arabic}</div>
        <div class="text-lg sm:text-xl font-semibold text-white">${n.transliteration}</div>
      </div>
      <div class="text-emerald-300 text-base sm:text-lg font-medium text-center">${n.meaning}</div>
      <p class="text-emerald-400/80 text-sm mt-3 text-center"> </p>
    `;
    container.appendChild(card);
  });
}

function filterNames() {
  const term = document.getElementById('search').value.toLowerCase().trim();
  const filtered = namesOfAllah.filter(n => 
    n.arabic.toLowerCase().includes(term) ||
    n.transliteration.toLowerCase().includes(term) ||
    n.meaning.toLowerCase().includes(term)
  );
  renderNames(filtered);
}

window.onload = () => {
  renderNames(namesOfAllah);
};
