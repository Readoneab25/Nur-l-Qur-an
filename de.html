<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qur'an Audio Player • Full Quran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Amiri', serif; }
    .arabic { font-family: 'Scheherazade New', serif; direction: rtl; }
  #ho{
    font-size: x-large;
  }
  #ho:hover{
    color: gold;
  }
  </style>
</head>
<body class="bg-zinc-950 text-emerald-100 min-h-screen">

<header class="bg-zinc-900 sticky top-0 z-50 border-b border-emerald-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="text-3xl sm:text-4xl">ﷺ</div>
      <h1 class="text-2xl sm:text-3xl font-bold text-amber-400">Qur'an Audio</h1>
      <p><a href="index.html" id="ho">Home</a></p>
    </div>
    
  </div>
</header>

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 lg:py-8 flex flex-col lg:flex-row gap-6 lg:gap-8">


  <!-- Player -->
  <div class="w-full lg:flex-1 bg-zinc-900 rounded-3xl p-6 sm:p-8 lg:p-10 border border-emerald-700 order-1 lg:order-2" style="height:95vh; position:fixed;top:6%;left:0;">
    <iframe 
  src="https://www.qurancentral.com/embed/player" 
  width="100%" 
  height="100%" 
  style="border: none; border-radius: 1rem;"
  title="Quran Audio Player">
</iframe>
    </div>
<script>
// ======================== CONFIGURATION ========================
let allSurahs = [];
let currentSurah = null;
let currentAudioUrls = [];
let currentIndex = 0;
let isPlaying = false;
let skipOnError = true;

// Reciter mapping: display name → CDN identifier (Islamic Network)
const reciterMap = {
  "Mishary Rashid Alafasy": "ar.alafasy",
  "Mahmoud Khalil Al-Husary": "ar.husary",
  "Muhammad Siddiq Al-Minshawi": "ar.minshawi",
  "Maher Al Muaiqly": "ar.mahermuaiqly",
  "Abdurrahman As-Sudais": "ar.sudais"
};

// DOM elements
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const surahNameEl = document.getElementById('surah-name');
const surahInfoEl = document.getElementById('surah-info');
const ayahCounterEl = document.getElementById('ayah-counter');

// ======================== HELPER FUNCTIONS ========================
function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

function updateAyahCounter() {
  if (currentSurah) {
    ayahCounterEl.textContent = `Ayah ${currentIndex + 1} / ${currentSurah.numberOfAyahs}`;
  } else {
    ayahCounterEl.textContent = '';
  }
}

// Build audio URL using Islamic Network CDN
function buildAudioUrl(surahNumber, ayahNumber, reciterCode) {
  const surahPadded = String(surahNumber).padStart(3, '0');
  const ayahPadded = String(ayahNumber).padStart(3, '0');
  return `https://cdn.islamic.network/quran/audio/128/${reciterCode}/${surahPadded}${ayahPadded}.mp3`;
}

// Load a surah: generate all URLs and start playing
function playSurah(surah) {
  // Stop any current playback
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    playBtn.innerHTML = '▶';
  }

  currentSurah = surah;
  surahNameEl.textContent = surah.name;
  surahInfoEl.textContent = surah.englishName;

  const reciterName = document.getElementById('reciter').value;
  const reciterCode = reciterMap[reciterName];
  if (!reciterCode) {
    console.error('Invalid reciter selected');
    ayahCounterEl.textContent = 'Error: Reciter not found';
    return;
  }

  // Build URLs for all ayahs
  currentAudioUrls = [];
  for (let i = 1; i <= surah.numberOfAyahs; i++) {
    const url = buildAudioUrl(surah.number, i, reciterCode);
    currentAudioUrls.push(url);
    if (i === 1) console.log('First audio URL:', url);
  }

  currentIndex = 0;
  updateAyahCounter();
  skipOnError = true;
  playCurrent();
}

function playCurrent() {
  if (!currentSurah) return;
  if (currentIndex >= currentAudioUrls.length) {
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      playBtn.innerHTML = '▶';
    }
    return;
  }

  const url = currentAudioUrls[currentIndex];
  audio.src = url;

  audio.play()
    .then(() => {
      isPlaying = true;
      playBtn.innerHTML = '❚❚';
      skipOnError = true;
    })
    .catch(err => {
      console.error(`Playback error for ayah ${currentIndex+1} (${url}):`, err);
      if (skipOnError && currentSurah) {
        skipOnError = false;
        nextAyah();
      }
    });
}

function togglePlay() {
  if (!currentSurah) return;
  if (isPlaying) {
    audio.pause();
    playBtn.innerHTML = '▶';
    isPlaying = false;
  } else {
    playCurrent();
  }
}

function prevAyah() {
  if (!currentSurah) return;
  if (currentIndex > 0) {
    currentIndex--;
    updateAyahCounter();
    skipOnError = true;
    playCurrent();
  }
}

function nextAyah() {
  if (!currentSurah) return;
  if (currentIndex + 1 < currentSurah.numberOfAyahs) {
    currentIndex++;
    updateAyahCounter();
    skipOnError = true;
    playCurrent();
  } else {
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      playBtn.innerHTML = '▶';
    }
  }
}

function changeReciter() {
  if (currentSurah) {
    playSurah(currentSurah);
  }
}

// ======================== SURAH LIST UI ========================
async function loadSurahs() {
  try {
    const res = await fetch('https://api.alquran.cloud/v1/surah');
    const data = await res.json();
    allSurahs = data.data;
    renderSurahs(allSurahs);
  } catch (e) {
    console.error('Failed to load surahs:', e);
    document.getElementById('surah-list').innerHTML = '<div class="text-red-400 p-4">Error loading surahs. Check your internet connection.</div>';
  }
}

function renderSurahs(list) {
  const container = document.getElementById('surah-list');
  container.innerHTML = '';
  list.forEach(s => {
    const div = document.createElement('div');
    div.className = "bg-zinc-800 hover:bg-zinc-700 p-4 sm:p-5 rounded-3xl cursor-pointer transition-all border border-emerald-700 text-base sm:text-lg";
    div.innerHTML = `
      <div class="flex gap-3 sm:gap-4 items-center">
        <div class="text-3xl sm:text-4xl font-bold text-amber-400 min-w-[2.5rem] text-center">${s.number}</div>
        <div>
          <div class="arabic">${s.name}</div>
          <div class="text-emerald-300 text-sm sm:text-base">${s.englishName} • ${s.numberOfAyahs} ayahs</div>
        </div>
      </div>
    `;
    div.onclick = () => playSurah(s);
    container.appendChild(div);
  });
}

function filterSurahs() {
  const term = document.getElementById('search').value.toLowerCase();
  const filtered = allSurahs.filter(s => 
    s.name.toLowerCase().includes(term) || s.englishName.toLowerCase().includes(term)
  );
  renderSurahs(filtered);
}

// ======================== AUDIO EVENT HANDLERS ========================
audio.ontimeupdate = () => {
  if (!audio.duration) return;
  const percent = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress').style.width = percent + '%';
  document.getElementById('current-time').textContent = formatTime(audio.currentTime);
  document.getElementById('total-time').textContent = formatTime(audio.duration);
};

audio.onended = () => {
  nextAyah();
};

audio.onerror = (e) => {
  if (currentSurah && skipOnError) {
    console.warn(`Audio failed for ayah ${currentIndex+1}. URL: ${audio.src}`);
    skipOnError = false;
    nextAyah();
  }
};

document.getElementById('progress-bar').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  if (audio.duration) {
    audio.currentTime = percent * audio.duration;
  }
});

// ======================== INITIALIZATION ========================
window.onload = () => {
  const select = document.getElementById('reciter');
  Object.keys(reciterMap).forEach(name => {
    const opt = document.createElement('option');
    opt.textContent = name;
    opt.value = name;
    select.appendChild(opt);
  });
  loadSurahs();
};
</script>
</body>
</html>
